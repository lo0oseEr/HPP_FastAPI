version: 2.1

jobs:

  build:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Install Dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Validate FastAPI App
          command: |
            python -m py_compile app/main.py

      # Create artifact files
      - run:
          name: Generate Build Report
          command: |
            mkdir -p reports
            echo "Build Successful" > reports/build_report.txt

      # Store artifacts
      - store_artifacts:
          path: reports
          destination: build-reports


  test:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Run Tests
          command: |
            mkdir -p test-results
            echo "<testsuite></testsuite>" > test-results/results.xml
            echo "Running Tests"

      # Store test results
      - store_test_results:
          path: test-results

      # Store test artifacts
      - store_artifacts:
          path: test-results
          destination: test-results


  deploy:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Deploy Application
          command: |
            mkdir -p deploy-logs
            echo "Deployment Successful" > deploy-logs/deploy.txt
            echo "Deploying Application"

      # Store deployment artifacts
      - store_artifacts:
          path: deploy-logs
          destination: deploy-logs


workflows:

  version: 2

  CircleCI_Trial-Workflow:

    jobs:
      - build

      - test:
          requires:
            - build

      - deploy:
          requires:
            - test