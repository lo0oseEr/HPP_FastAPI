version: 2.1

jobs:

  build:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Install Dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Validate FastAPI App
          command: |
            python -m py_compile app/main.py


  test:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Run Tests
          command: |
            echo "Running Tests"


  deploy:
    docker:
      - image: cimg/python:3.12

    steps:
      - checkout

      - run:
          name: Deploy Application
          command: |
            echo "Deploying Application"


workflows:

  version: 2

  CircleCI_Trial-Workflow:

    jobs:
      - build

      - test:
          requires:
            - build

      - deploy:
          requires:
            - test